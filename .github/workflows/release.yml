name: Build and Release

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rougo-${{ github.ref_name }}-release-apks
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            V2 release built by GitHub Actions.

            - Loads embedded audiobook metadata for local media.
            - Extracts and caches embedded M4B cover art, including attached-picture streams.
            - Adds startup crash reporting and hardens launcher entry points.
            - Shows the installed app name as 朗語.
            - Keeps the app-visible version at V2.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
